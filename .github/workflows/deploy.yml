name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-rgrtu-bots
  cancel-in-progress: true

env:
  DEPLOY_HOST: "194.226.163.137"
  DEPLOY_USER: "root"
  DEPLOY_PATH: "/opt/rgrtu-tg-bot"
  DEPLOY_MAX_PATH: "/opt/rgrtu-max-bot"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync project
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.tg' \
            --exclude '.venv' \
            --exclude 'data' \
            --exclude 'output' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Sync MAX project
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.tg' \
            --exclude '.venv' \
            --exclude 'data' \
            --exclude 'output' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_MAX_PATH}/"

      - name: Deploy Telegram bot
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && docker compose -p rgrtu-tg-bot -f docker-compose.tg.yml up -d --build --force-recreate"

      - name: Verify Telegram bot
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && docker compose -p rgrtu-tg-bot -f docker-compose.tg.yml ps"

      - name: Deploy MAX bot
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_MAX_PATH}' && docker compose -p rgrtu-max-bot -f docker-compose.yml up -d --build --force-recreate"

      - name: Verify MAX bot
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_MAX_PATH}' && docker compose -p rgrtu-max-bot -f docker-compose.yml ps"
