services:
  tg-bot:
    build: .
    restart: unless-stopped
    env_file: .env.tg
    volumes:
      - ./data:/data
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    command: ["python", "-m", "app.tg.runner"]
    healthcheck:
      test: ["CMD", "python", "-c", "from app.config import get_settings; assert get_settings().telegram_bot_token"]
      interval: 60s
      timeout: 10s
      retries: 3
